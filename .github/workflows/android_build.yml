name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant Build Permissions
        run: chmod +x gradlew

      - name: Assemble Android APK
        run: ./gradlew assembleDebug -x lint

      - name: Upload Final App
        uses: actions/upload-artifact@v4
        with:
          name: Jailex-Mobile-App
          path: app/build/outputs/apk/debug/app-debug.apk
