name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Setup Node.js (2026 Default)
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Java (LTS 17)
        uses: actions/setup-java@v6
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Capacitor Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # We force a sync to create the android folder from scratch
          npx cap init "Jailex AI" com.justquitbro7.jailexai --web-dir app/src
          npx cap add android

      - name: Build Debug APK
        run: |
          npx cap copy android
          cd android && ./gradlew assembleDebug

      - name: Upload Finished App
        uses: actions/upload-artifact@v6
        with:
          name: Jailex-App-Beta
          path: android/app/build/outputs/apk/debug/app-debug.apk
