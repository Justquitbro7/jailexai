name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js (2026 Standard)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java (LTS 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Deep Clean & Install
        run: |
          # Force remove any conflicting Android files in the root
          rm -f build.gradle
          rm -f settings.gradle
          rm -rf android
          
          # Install fresh Capacitor tools
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npm install

      - name: Initialize & Sync
        run: |
          # Create a fresh Android project shell
          npx cap init "Jailex AI" com.justquitbro7.jailexai --web-dir app/src
          npx cap add android
          npx cap sync android

      - name: Grant Build Permissions
        run: chmod +x android/gradlew

      - name: Assemble Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Jailex APK
        uses: actions/upload-artifact@v4
        with:
          name: Jailex-App-Beta
          path: android/app/build/outputs/apk/debug/app-debug.apk
