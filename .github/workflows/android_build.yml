name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js (2026 Standard)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java (LTS 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Force Clean Environment
        run: |
          # Remove any files that confuse the Capacitor builder
          rm -f build.gradle
          rm -f settings.gradle
          rm -rf android
          # Create a dummy folder if it doesn't exist to prevent crash
          mkdir -p app/src
          
      - name: Install & Initialize
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          # We manually create the config to ensure the path is 100% correct
          npx cap init "Jailex AI" com.justquitbro7.jailexai --web-dir app/src
          npx cap add android

      - name: Sync & Grant Permissions
        run: |
          npx cap sync android
          chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Jailex APK
        uses: actions/upload-artifact@v4
        with:
          name: Jailex-App-Beta
          path: android/app/build/outputs/apk/debug/app-debug.apk
