name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v6

      - name: 2. Set Node 24 & Java 17
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: actions/setup-java@v6
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Create Clean Workspace
        run: |
          # Kill old files
          rm -rf android package.json capacitor.config.*
          # Verify your HUD file exists where we think it is
          if [ ! -f "app/src/index.html" ]; then echo "CRITICAL: index.html not found in app/src/"; exit 1; fi
          
      - name: 4. Build JSON Config
        run: |
          # We use JSON to avoid TypeScript errors in the runner
          echo '{"appId":"com.justquitbro7.jailexai","appName":"Jailex AI","webDir":"app/src"}' > capacitor.config.json
          echo '{"name":"jailexai","dependencies":{"@capacitor/core":"latest","@capacitor/cli":"latest","@capacitor/android":"latest"}}' > package.json
          npm install

      - name: 5. Force Android Setup
        run: |
          npx cap add android
          npx cap sync android
          chmod +x android/gradlew

      - name: 6. Build APK
        run: |
          cd android
          # The -x lint flag speeds this up and skips minor errors
          ./gradlew assembleDebug -x lint

      - name: 7. Deliver
        uses: actions/upload-artifact@v6
        with:
          name: Jailex-App-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
