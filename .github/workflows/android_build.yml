name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Setup Node.js (24.x)
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Java (17)
        uses: actions/setup-java@v6
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Clean Environment
        run: |
          # Remove files that conflict with Capacitor's auto-generation
          rm -f build.gradle
          rm -f settings.gradle
          rm -rf android
          
      - name: Install & Sync
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          # This creates the project from scratch using your HUD folder
          npx cap init "Jailex AI" com.justquitbro7.jailexai --web-dir app/src
          npx cap add android
          npx cap sync android

      - name: Assemble APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Jailex-Mobile-Beta
          path: android/app/build/outputs/apk/debug/app-debug.apk
