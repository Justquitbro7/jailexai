name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Grab HUD Code
        uses: actions/checkout@v4

      - name: 2. Set 2026 Standards (Node 24 / Java 17)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. The "Nuke" Step
        run: |
          # This deletes the conflicting files so Capacitor can't find them
          rm -f build.gradle
          rm -f settings.gradle
          rm -rf android
          rm -f capacitor.config.ts
          rm -f package.json
          
      - name: 4. Re-create Project Files
        run: |
          # We create a fresh package.json on the fly
          echo '{"name":"jailexai","dependencies":{"@capacitor/core":"latest","@capacitor/cli":"latest","@capacitor/android":"latest"}}' > package.json
          npm install
          
          # We force a fresh Capacitor config that points ONLY to your HUD
          npx cap init "Jailex AI" com.justquitbro7.jailexai --web-dir app/src --noprompt
          npx cap add android

      - name: 5. Fix Android Permissions & Sync
        run: |
          npx cap sync android
          chmod +x android/gradlew

      - name: 6. Assemble APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 7. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Jailex-App-Beta
          path: android/app/build/outputs/apk/debug/app-debug.apk
