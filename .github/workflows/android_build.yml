name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js (2026 Default)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java (LTS 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 1. Deep Clean Environment
        run: |
          # Kill any old Android files that are breaking the build
          rm -rf android
          rm -f build.gradle
          rm -f settings.gradle
          # Ensure your HUD folder actually exists
          mkdir -p app/src
          
      - name: 2. Fresh Capacitor Install
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          # This command forces a brand new config to be generated
          npx cap init "Jailex AI" com.justquitbro7.jailexai --web-dir app/src --noprompt

      - name: 3. Create Android Shell
        run: |
          npx cap add android
          npx cap sync android
          # Fix permissions for the builder
          chmod +x android/gradlew

      - name: 4. Final APK Assembly
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 5. Deliver App
        uses: actions/upload-artifact@v4
        with:
          name: Jailex-Final-Beta
          path: android/app/build/outputs/apk/debug/app-debug.apk
