name: Build Jailex APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Get Code
        uses: actions/checkout@v4

      - name: 2. Setup Node & Java
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Clear Old Files
        run: |
          rm -rf android package.json capacitor.config.*
          
      - name: 4. Build Engine & Config
        run: |
          # We tell Capacitor EXACTLY where your file is
          echo '{"appId":"com.justquitbro7.jailexai","appName":"Jailex AI","webDir":"app/src/main/assets/www"}' > capacitor.config.json
          echo '{"name":"jailexai","dependencies":{"@capacitor/core":"latest","@capacitor/cli":"latest","@capacitor/android":"latest"}}' > package.json
          npm install

      - name: 5. Generate Android Files
        run: |
          npx cap add android
          npx cap sync android
          # This gives permission to the engine we just generated
          chmod +x android/gradlew

      - name: 6. Compile APK
        run: |
          cd android
          ./gradlew assembleDebug -x lint

      - name: 7. Upload App
        uses: actions/upload-artifact@v4
        with:
          name: Jailex-App-Beta
          path: android/app/build/outputs/apk/debug/app-debug.apk
